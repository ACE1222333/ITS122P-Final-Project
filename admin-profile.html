<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile — Carousell Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-styles.css">
<style>
/* Center the form card without touching .main layout */
.prof-center {
  max-width: 560px;
  margin: 0 auto;
}

/* Identity strip above the form */
.prof-identity {
  background: var(--accent);
  border-radius: 12px;
  padding: 1.6rem 1.8rem;
  display: flex;
  align-items: center;
  gap: 1.1rem;
  margin-bottom: 1.2rem;
  overflow: hidden;
}
.prof-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.prof-avatar svg {
  width: 24px; height: 24px;
  stroke: #fff; fill: none; stroke-width: 1.8;
}
.prof-identity-info { flex: 1; min-width: 0; }
.prof-identity-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.35rem;
  letter-spacing: 0.08em;
  color: #fff;
  line-height: 1.1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.prof-identity-role {
  font-size: 0.66rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.12);
  padding: 0.15rem 0.5rem;
  border-radius: 20px;
  display: inline-block;
  margin-top: 0.35rem;
}
.prof-identity-email {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.6);
  margin-top: 0.3rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Re-use .form-card from admin-styles.css — just override max-width */
.prof-center .form-card {
  max-width: none;
}

/* Section label inside the form */
.prof-section {
  font-size: 0.67rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.5rem;
  margin-bottom: 1.1rem;
  margin-top: 1.5rem;
}
.prof-section:first-of-type { margin-top: 0; }

/* Alert banners */
.prof-alert {
  border-radius: 8px;
  padding: 0.65rem 0.9rem;
  font-size: 0.82rem;
  margin-bottom: 1.2rem;
  display: none;
  align-items: center;
  gap: 0.5rem;
  line-height: 1.5;
}
.prof-alert.show { display: flex; }
.prof-alert svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.5; flex-shrink: 0; }
.prof-alert.err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #dc2626; }
.prof-alert.ok  { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3);  color: #15803d; }

/* Responsive two-col grid */
.prof-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; margin-bottom: 0.85rem; }
.prof-grid-1 { display: grid; grid-template-columns: 1fr;     gap: 0.85rem; margin-bottom: 0.85rem; }
@media (max-width: 560px) { .prof-grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="shell">
  <!-- Sidebar injected by admin-layout.js — exact same pattern as other admin pages -->
  <main class="main">

    <div class="page-header">
      <div class="page-title">Edit Profile</div>
    </div>

    <!-- Centered content — max-width wrapper only, .main layout is untouched -->
    <div class="prof-center">

      <!-- Identity header -->
      <div class="prof-identity">
        <div class="prof-avatar">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="prof-identity-info">
          <div class="prof-identity-name"  id="hdr-name">—</div>
          <span class="prof-identity-role">Administrator</span>
          <div class="prof-identity-email" id="hdr-email">—</div>
        </div>
      </div>

      <!-- Form card — reuses admin-styles.css .form-card -->
      <div class="form-card">

        <!-- Alerts -->
        <div class="prof-alert err" id="pa-error">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="pa-error-msg"></span>
        </div>
        <div class="prof-alert ok" id="pa-success">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Profile updated successfully!</span>
        </div>

        <!-- ① Personal Information -->
        <div class="prof-section">Personal Information</div>

        <div class="prof-grid-2">
          <div class="form-group">
            <label class="form-label" for="p-fname">First Name</label>
            <input class="form-input" type="text" id="p-fname" placeholder="Admin" autocomplete="given-name">
          </div>
          <div class="form-group">
            <label class="form-label" for="p-lname">Last Name</label>
            <input class="form-input" type="text" id="p-lname" placeholder="Carousell" autocomplete="family-name">
          </div>
        </div>

        <div class="prof-grid-1">
          <div class="form-group">
            <label class="form-label" for="p-email">Email Address</label>
            <input class="form-input" type="email" id="p-email" placeholder="admin@carousell.com" autocomplete="email">
          </div>
        </div>

        <!-- ② Change Password -->
        <div class="prof-section">
          Change Password
          <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:0.68rem;color:var(--text-light);margin-left:0.4rem;">
            — leave blank to keep current
          </span>
        </div>

        <div class="prof-grid-1">
          <div class="form-group">
            <label class="form-label" for="p-cur-pass">Current Password</label>
            <input class="form-input" type="password" id="p-cur-pass"
                   placeholder="Enter your current password" autocomplete="current-password">
          </div>
        </div>

        <div class="prof-grid-2">
          <div class="form-group">
            <label class="form-label" for="p-new-pass">New Password</label>
            <input class="form-input" type="password" id="p-new-pass"
                   placeholder="Min. 8 characters" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label class="form-label" for="p-conf-pass">Confirm Password</label>
            <input class="form-input" type="password" id="p-conf-pass"
                   placeholder="Repeat new password" autocomplete="new-password">
          </div>
        </div>

        <!-- Actions — reuse admin-styles.css .form-actions -->
        <div class="form-actions">
          <button class="btn-save" id="save-btn" onclick="saveProfile()">Save Changes</button>
          <button class="btn-cancel" onclick="resetForm()">Reset</button>
        </div>

      </div><!-- /form-card -->
    </div><!-- /prof-center -->

  </main>
</div>

<script src="admin-data.js"></script>
<script src="admin-layout.js?v=2"></script>
<script>
/* ── Exact same boot sequence as all other admin pages ── */
initAdminLayout('profile');
checkAdminAuth();

/* State */
let _original = {};

/* ════════════════════════════════════════════════════════════════
   INIT  — pre-fill from session, then refresh from API
════════════════════════════════════════════════════════════════ */
(async function init() {
  /* 1. Fill immediately from localStorage so fields are not blank */
  try {
    const raw = localStorage.getItem('carousell_session');
    if (raw) {
      const u = JSON.parse(raw);
      _fill(u);
      _original = { ...u };
    }
  } catch(e) {}

  /* 2. Fetch latest from server (phone/address may not be in session token)
        PHP integration point: GET api/profile.php */
  try {
    const res  = await adminFetch('api/profile.php');
    const data = await res.json();
    if (data && !data.error) {
      _fill(data);
      _original = { ...data };
      /* Keep session in sync */
      const raw = localStorage.getItem('carousell_session');
      if (raw) {
        const sess = JSON.parse(raw);
        localStorage.setItem('carousell_session', JSON.stringify({ ...sess, ...data }));
      }
    }
  } catch(e) {
    console.warn('Profile API unavailable — using session data.', e);
  }

  /* 3. Attach live-update listeners after data is loaded */
  _attachListeners();
})();

/* ── Fill all form fields and the identity header ── */
function _fill(u) {
  const fname = u.first_name || '';
  const lname = u.last_name  || '';
  _set('p-fname', fname);
  _set('p-lname', lname);
  _set('p-email', u.email   || '');

  const full = [fname, lname].filter(Boolean).join(' ');
  const hN = document.getElementById('hdr-name');
  const hE = document.getElementById('hdr-email');
  if (hN) hN.textContent = full  || '—';
  if (hE) hE.textContent = u.email || '—';
}

function _set(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = val;
}

function _get(id) { return document.getElementById(id)?.value.trim() ?? ''; }
function _getRaw(id) { return document.getElementById(id)?.value ?? ''; }

/* ── Live-update identity header as admin types ── */
function _attachListeners() {
  const updateName = () => {
    const full = [_get('p-fname'), _get('p-lname')].filter(Boolean).join(' ');
    const el = document.getElementById('hdr-name');
    if (el) el.textContent = full || '—';
  };
  document.getElementById('p-fname')?.addEventListener('input', updateName);
  document.getElementById('p-lname')?.addEventListener('input', updateName);
  document.getElementById('p-email')?.addEventListener('input', () => {
    const el = document.getElementById('hdr-email');
    if (el) el.textContent = _get('p-email') || '—';
  });
}

/* ── Reset form to last-saved values ── */
function resetForm() {
  _fill(_original);
  ['p-cur-pass','p-new-pass','p-conf-pass'].forEach(id => _set(id, ''));
  _alert('', '');
}

/* ════════════════════════════════════════════════════════════════
   SAVE
   PHP integration point: POST api/profile.php
════════════════════════════════════════════════════════════════ */
async function saveProfile() {
  const fname   = _get('p-fname');
  const lname   = _get('p-lname');
  const email   = _get('p-email');
  const curPass = _getRaw('p-cur-pass');
  const newPass = _getRaw('p-new-pass');
  const conPass = _getRaw('p-conf-pass');

  _alert('', '');

  if (!fname || !lname)             { _alert('err', 'First and last name are required.'); return; }
  if (!email)                       { _alert('err', 'Email address is required.'); return; }
  if (newPass && newPass.length < 8){ _alert('err', 'New password must be at least 8 characters.'); return; }
  if (newPass && newPass !== conPass){ _alert('err', 'New passwords do not match.'); return; }
  if (newPass && !curPass)          { _alert('err', 'Enter your current password to change it.'); return; }

  const btn       = document.getElementById('save-btn');
  btn.disabled    = true;
  btn.textContent = 'Saving…';

  try {
    const payload = { first_name: fname, last_name: lname, email };
    if (newPass) { payload.current_password = curPass; payload.new_password = newPass; }

    const res  = await adminFetch('api/profile.php', {
      method: 'POST',
      body:   JSON.stringify(payload),
    });
    const data = await res.json();

    if (data.error) { _alert('err', data.error); return; }

    /* Update localStorage session */
    const raw = localStorage.getItem('carousell_session');
    if (raw) {
      const sess = JSON.parse(raw);
      localStorage.setItem('carousell_session',
        JSON.stringify({ ...sess, first_name: fname, last_name: lname, email }));
    }
    _original = { ..._original, first_name: fname, last_name: lname, email };

    /* Clear password fields */
    ['p-cur-pass','p-new-pass','p-conf-pass'].forEach(id => _set(id, ''));

    _alert('ok', '');
    showToast('Profile saved!');

  } catch(e) {
    _alert('err', 'Network error. Please try again.');
    console.error('saveProfile:', e);
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Save Changes';
  }
}

/* ── Alert helper ── */
function _alert(type, msg) {
  const err = document.getElementById('pa-error');
  const ok  = document.getElementById('pa-success');
  if (!err || !ok) return;
  err.classList.remove('show');
  ok.classList.remove('show');
  if (type === 'err') {
    document.getElementById('pa-error-msg').textContent = msg;
    err.classList.add('show');
  } else if (type === 'ok') {
    ok.classList.add('show');
    clearTimeout(ok._t);
    ok._t = setTimeout(() => ok.classList.remove('show'), 4000);
  }
}
</script>
</body>
</html>
