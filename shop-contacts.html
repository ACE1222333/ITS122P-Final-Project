<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Carousell</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shop-styles.css">
</head>
<body>

<!-- Nav, cart, auth, toast injected by shop-layout.js -->

<div class="contacts-top">
  <div class="contact-form-side">
    <h1>Contact</h1>

    <!-- Login wall — shown when user is NOT logged in -->
    <div id="contact-login-wall" style="display:none;">
      <div class="login-wall">
        <h4>Sign in to Send a Message</h4>
        <p>You need to be logged in to contact us. Please sign in or create a free account to reach out.</p>
        <button class="btn-login-prompt" onclick="openAuth()">Log in / Register</button>
      </div>
    </div>

    <!-- Contact form — shown when user IS logged in -->
    <div id="contact-form-wrap">
      <!-- Sender info pulled from session — shown as a read-only badge -->
      <div id="contact-sender-info" style="
        background:var(--bg-section);border-radius:8px;padding:0.65rem 0.9rem;
        margin-bottom:1rem;font-size:0.82rem;color:var(--text-muted);
        display:flex;align-items:center;gap:0.4rem;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        Sending as <strong id="contact-sender-name" style="color:var(--text);margin-left:0.2rem;">—</strong>
      </div>

      <!-- PHP integration point: POST to api/contact.php -->
      <div class="form-group">
        <input type="text" placeholder="Subject" id="c-subject">
      </div>
      <div class="form-group">
        <textarea placeholder="Write your message…" id="c-message"></textarea>
      </div>
      <button class="btn-send" id="contact-send-btn" onclick="sendMessage()">Send Message</button>
    </div>
  </div>

  <!-- Warm boutique interior — Unsplash (free) -->
  <div class="contact-img-side">
    <img src="https://images.unsplash.com/photo-1567401893414-76b7b1e5a7a5?w=800&q=85&auto=format&fit=crop"
         alt="Contact Carousell" loading="lazy">
  </div>
</div>

<div class="social-section">
  <h2>Visit our Social Media Platforms</h2>
  <div class="social-grid">
    <div class="social-card" onclick="window.open('https://facebook.com/your-page','_blank')">
      <div class="social-icon">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Facebook_Logo_2023.png/1280px-Facebook_Logo_2023.png" alt="Facebook" loading="lazy">
      </div>
      <button class="btn-social">Facebook</button>
    </div>
    <div class="social-card" onclick="window.open('https://instagram.com/your-handle','_blank')">
      <div class="social-icon">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSuH7c5cLpGehi0b4iQk90fXUzC9p7Ebla13w&s" alt="Instagram" loading="lazy">
      </div>
      <button class="btn-social">Instagram</button>
    </div>
    <div class="social-card" onclick="window.open('https://tiktok.com/@your-handle','_blank')">
      <div class="social-icon">
        <img src="https://www.citypng.com/public/uploads/preview/tik-tok-logo-transparent-square-701751694793273qftyarldbx.png" alt="TikTok" loading="lazy">
      </div>
      <button class="btn-social">TikTok</button>
    </div>
  </div>
</div>

<footer><span>© 2025 Carousell. All rights reserved.</span></footer>

<script src="shop-shared.js"></script>
<script src="shop-layout.js"></script>
<script>
initShopLayout('contacts');
/* setCurrentUser in shop-shared.js already manages contact-login-wall
   and contact-form-wrap on every auth change, including page load via
   restoreSession() called inside initShopLayout. No extra code needed. */
</script>
</body>
</html>
